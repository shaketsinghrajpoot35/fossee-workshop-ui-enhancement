{% extends 'workshop_app/base.html' %}

{% block title %}
    Logged Out | FOSSEE Workshops
{% endblock %}

{% block content %}
    <div class="activation-wrapper">
        <div class="activation-card">
            <div class="activation-icon activation-icon-success">
                <span class="material-icons" style="color: #10b981;">waving_hand</span>
            </div>
            <h2 class="font-weight-bold mb-2">You've been logged out</h2>
            <p class="text-muted mb-4" style="font-size: 0.95rem;">Thank you for using FOSSEE Workshops. See you again soon!</p>
            <a href="/" class="btn btn-primary btn-lg">
                <span class="material-icons mr-2">login</span> Sign Back In
            </a>
        </div>
    </div>
{% endblock %}
